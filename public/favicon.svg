<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- origami paper crane, site accent palette -->
  <g stroke-linejoin="round">
    <!-- tail -->
    <polygon points="38,31 47,12 33,27" fill="#4f46e5"/>
    <!-- neck + head -->
    <polygon points="14,31 7,8 19,27" fill="#4f46e5"/>
    <!-- beak -->
    <polygon points="7,8 1,13 9,14" fill="#312e81"/>
    <!-- body -->
    <polygon points="12,30 26,24 40,30 26,42" fill="#6d28d9"/>
    <!-- far wing (shaded) -->
    <polygon points="18,28 30,7 34,28" fill="#7c3aed"/>
    <!-- near wing (light) -->
    <polygon points="14,29 24,5 30,28" fill="#a78bfa"/>
  </g>
</svg>
